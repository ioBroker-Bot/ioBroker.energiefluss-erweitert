version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: weekly
    time: "04:00"
    timezone: Europe/Berlin
  open-pull-requests-limit: 20
  assignees:
    - Author
  versioning-strategy: increase
  ignore:
    - dependency-name: "sharp"
      versions: [">=0.33.0"]

- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: monthly
    day: 15
    time: "00:05"
    timezone: Europe/Berlin
  open-pull-requests-limit: 5
  assignees:
    - Author