# Dependabot will run on day 9 of each month at 01:43 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '04:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 20
    assignees:
      - 'Author'
    versioning-strategy: 'increase'
    ignore:
      - dependency-name: 'sharp'
        versions:
          - '>=0.33.0'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '43 1 9 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'Author'
